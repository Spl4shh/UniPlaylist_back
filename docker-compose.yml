version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: uniplaylist-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: uniplaylist
      MYSQL_USER: uniuser
      MYSQL_PASSWORD: unipassword
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
